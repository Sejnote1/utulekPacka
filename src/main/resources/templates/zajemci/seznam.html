<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><title>Zájemci – Zdravá Packa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        nav { background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .nav-brand { font-size: 20px; font-weight: 700; color: #f8fafc; }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a { color: rgba(255,255,255,0.65); text-decoration: none; padding: 8px 14px; border-radius: 8px; font-size: 14px; }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .nav-user { color: rgba(255,255,255,0.5); font-size: 13px; }
        .btn-logout { padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.7); font-size: 13px; text-decoration: none; }
        main { padding: 40px 32px; max-width: 1100px; margin: 0 auto; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        h1 { font-size: 26px; font-weight: 700; }
        .btn-primary { background: linear-gradient(135deg, #e94560, #c62a47); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 24px; }
        .search-bar input { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; color: #e2e8f0; padding: 10px 16px; font-size: 14px; outline: none; flex: 1; }
        .search-bar input:focus { border-color: #e94560; }
        .search-bar button { padding: 10px 20px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 14px; }
        .table-wrap { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.06); padding: 14px 16px; text-align: left; font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; }
        td { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 14px; }
        tr:hover td { background: rgba(255,255,255,0.03); }
        .btn-sm { padding: 5px 12px; border-radius: 7px; font-size: 13px; text-decoration: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); background: transparent; }
        .btn-sm:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .flash-ok { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; color: #86efac; font-size: 14px; }
        .empty { text-align: center; padding: 48px; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
<nav>
    <div class="nav-brand">🐾 Zdravá Packa</div>
    <div class="nav-links">
        <a th:href="@{/zvirata}">Zvířata</a>
        <a th:href="@{/adopce}">Adopce</a>
        <a th:href="@{/zajemci}" class="active">Zájemci</a>
        <a th:href="@{/uzivatele}" sec:authorize="hasAuthority('Administrátor')">Uživatelé</a>
        <a th:href="@{/admin}" sec:authorize="hasAuthority('Administrátor')">Dashboard</a>
    </div>
    <div class="nav-right">
        <span class="nav-user" sec:authentication="name">uživatel</span>
        <a href="/logout" class="btn-logout">Odhlásit</a>
    </div>
</nav>
<main>
    <div class="page-header">
        <h1>🏠 Zájemci o adopci</h1>
        <a th:href="@{/zajemci/novy}" class="btn-primary"
           sec:authorize="hasAnyAuthority('Recepční','Administrátor')">+ Přidat zájemce</a>
    </div>
    <div class="flash-ok" th:if="${zprava}" th:text="${zprava}"></div>
    <form th:action="@{/zajemci}" method="get" class="search-bar">
        <input type="text" name="hledat" th:value="${hledat}" placeholder="Hledat podle jména..."/>
        <button type="submit">Hledat</button>
    </form>
    <div class="table-wrap">
        <table>
            <thead><tr><th>Jméno</th><th>Email</th><th>Telefon</th><th>Město</th><th>Má zvířata</th><th>Akce</th></tr></thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(zajemci)}">
                <td colspan="6" class="empty">Žádní zájemci nenalezeni</td>
            </tr>
            <tr th:each="z : ${zajemci}">
                <td><strong th:text="${z.jmeno + ' ' + z.prijmeni}">-</strong></td>
                <td th:text="${z.email}">-</td>
                <td th:text="${z.telefon}">-</td>
                <td th:text="${z.mesto}">-</td>
                <td th:text="${z.maJinaZvirata ? 'Ano' : 'Ne'}">-</td>
                <td style="display:flex; gap:6px;">
                    <a th:href="@{/zajemci/{id}(id=${z.idZajemce})}" class="btn-sm">Detail</a>
                    <a th:href="@{/zajemci/{id}/upravit(id=${z.idZajemce})}" class="btn-sm"
                       sec:authorize="hasAnyAuthority('Administrátor','Recepční')">Upravit</a>
                    <form th:action="@{/zajemci/{id}/anonymizovat(id=${z.idZajemce})}" method="post" sec:authorize="hasAuthority('Administrátor')">
                        <button type="submit" class="btn-sm" style="color:#fca5a5;border-color:rgba(239,68,68,0.3)" onclick="return confirm('Opravdu anonymizovat osobní data? Akce napojena na nativní uloženou proceduru!');">Anonymizovat (GDPR)</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
