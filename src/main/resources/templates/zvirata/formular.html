<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${zvire.idZvire == null ? 'Nové zvíře' : 'Upravit zvíře'} + ' – Zdravá Packa'">Formulář</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        nav { background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .nav-brand { font-size: 20px; font-weight: 700; color: #f8fafc; }
        .nav-links a { color: rgba(255,255,255,0.65); text-decoration: none; padding: 8px 14px; border-radius: 8px; font-size: 14px; }
        .nav-links a:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-logout { padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.7); font-size: 13px; text-decoration: none; }
        main { padding: 40px 32px; max-width: 720px; margin: 0 auto; }
        .back { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 14px; margin-bottom: 24px; display: block; }
        .back:hover { color: #fff; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 28px; }
        .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 32px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full { grid-column: 1 / -1; }
        label { font-size: 13px; color: rgba(255,255,255,0.55); }
        label .req { color: #e94560; }
        input, select, textarea {
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 9px; color: #e2e8f0; padding: 10px 14px; font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus { border-color: #e94560; }
        select option { background: #1e293b; }
        .form-actions { display: flex; gap: 12px; margin-top: 28px; }
        .btn-primary { background: linear-gradient(135deg, #e94560, #c62a47); color: #fff; border: none; padding: 11px 24px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-secondary { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #e2e8f0; padding: 11px 20px; border-radius: 10px; font-size: 15px; text-decoration: none; }
    </style>
</head>
<body>
<nav>
    <div class="nav-brand">🐾 Zdravá Packa</div>
    <div class="nav-links">
        <a th:href="@{/zvirata}">Zvířata</a>
        <a th:href="@{/adopce}">Adopce</a>
    </div>
    <a href="/logout" class="btn-logout">Odhlásit</a>
</nav>
<main>
    <a th:href="@{/zvirata}" class="back">← Zpět na seznam</a>
    <h1 th:text="${zvire.idZvire == null ? '🐾 Přidat nové zvíře' : '✏️ Upravit zvíře'}">Formulář</h1>

    <div class="card">
        <form th:action="@{/zvirata/ulozit}" method="post" enctype="multipart/form-data">
            <!-- Hidden ID pro editaci -->
            <input type="hidden" name="idZvire" th:value="${zvire.idZvire}"/>

            <div class="form-grid">
                <div class="form-group">
                    <label>Jméno <span class="req">*</span></label>
                    <input type="text" name="jmeno" th:value="${zvire.jmeno}" required placeholder="Např. Rex"/>
                </div>
                <div class="form-group">
                    <label>Pohlaví <span class="req">*</span></label>
                    <select name="pohlavi" required>
                        <option value="">– vyberte –</option>
                        <option value="M" th:selected="${zvire.pohlavi == 'M'}">Samec</option>
                        <option value="F" th:selected="${zvire.pohlavi == 'F'}">Samice</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Datum narození</label>
                    <input type="date" name="datumNarozeni" th:value="${zvire.datumNarozeni}"/>
                </div>
                <div class="form-group">
                    <label>Datum přijetí <span class="req">*</span></label>
                    <input type="date" name="datumPrijeti" th:value="${zvire.datumPrijeti}" required/>
                </div>
                <div class="form-group">
                    <label>Plemeno <span class="req">*</span></label>
                    <!-- name="plemeno" + konvertor String→Plemeno v WebConfig -->
                    <select name="plemeno" required>
                        <option value="">– vyberte –</option>
                        <option th:each="p : ${plemena}"
                                th:value="${p.idPlemeno}"
                                th:text="${p.druh.nazev + ' – ' + p.nazev}"
                                th:selected="${zvire.plemeno != null and zvire.plemeno.idPlemeno == p.idPlemeno}">
                        </option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status <span class="req">*</span></label>
                    <!-- name="status" + konvertor String→StatusZvirete v WebConfig -->
                    <select name="status" required>
                        <option value="">– vyberte –</option>
                        <option th:each="s : ${statusy}"
                                th:value="${s.idStatus}"
                                th:text="${s.stav}"
                                th:selected="${zvire.status != null and zvire.status.idStatus == s.idStatus}">
                        </option>
                    </select>
                </div>
                <div class="form-group full">
                    <label>Povaha</label>
                    <input type="text" name="povaha" th:value="${zvire.povaha}" maxlength="255" placeholder="Např. přátelský, hravý, klidný..."/>
                </div>
                <div class="form-group full" style="background: rgba(255,255,255,0.02); padding: 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);">
                    <label style="font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 12px; display: block;">🏥 Zdravotní a chovatelská specifika</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group">
                            <label>Oblíbené krmivo</label>
                            <input type="text" id="ui_krmivo" placeholder="Např. Granule, maso..."/>
                        </div>
                        <div class="form-group" style="justify-content: flex-end; padding-bottom: 10px;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #e2e8f0; font-size: 14px;">
                                <input type="checkbox" id="ui_alergie" style="width: auto; margin: 0; transform: scale(1.2); accent-color: #e94560;"/>
                                Zvíře má prokazatelné alergie
                            </label>
                        </div>
                        <div class="form-group full">
                            <label>Zdravotní poznámka</label>
                            <input type="text" id="ui_zdravi" placeholder="Např. Kulhá na pravou nohu..."/>
                        </div>
                    </div>
                    <!-- Skryté pole na prolnutí požadavků do JSON pro Databázi -->
                    <input type="hidden" name="specifika" id="specifika_json" th:value="${zvire.specifika}"/>
                </div>
                <div class="form-group full">
                    <label>Fotografie zvířete</label>
                    <input type="file" name="obrazek_file" accept="image/*"/>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">💾 Uložit</button>
                <a th:href="@{/zvirata}" class="btn-secondary">Zrušit</a>
            </div>
        </form>
    </div>
</main>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const jsonField = document.getElementById('specifika_json');
        const uiKrmivo = document.getElementById('ui_krmivo');
        const uiAlergie = document.getElementById('ui_alergie');
        const uiZdravi = document.getElementById('ui_zdravi');
        
        // Načtení dat z databázového JSONu do moderních UI prvků při editaci zvířete
        if (jsonField.value) {
            try {
                const data = JSON.parse(jsonField.value);
                if (data.krmivo) uiKrmivo.value = data.krmivo;
                if (data.alergie === true) uiAlergie.checked = true;
                if (data.zdravi) uiZdravi.value = data.zdravi;
            } catch(e) { }
        }
        
        // Transformace UI prvků zpět do tvrdého JSON stringu při zmáčknutí 'Uložit'
        document.querySelector('form').addEventListener('submit', function() {
            const data = {};
            if (uiKrmivo.value.trim() !== '') data.krmivo = uiKrmivo.value.trim();
            if (uiAlergie.checked) data.alergie = true;
            if (uiZdravi.value.trim() !== '') data.zdravi = uiZdravi.value.trim();
            
            if(Object.keys(data).length > 0) {
                jsonField.value = JSON.stringify(data);
            } else {
                jsonField.value = "";
            }
        });
    });
</script>
</body>
</html>
