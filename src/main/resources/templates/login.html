<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Přihlášení – Útulek Zdravá Packa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 52px; }
        .logo h1 { color: #fff; font-size: 22px; font-weight: 700; margin-top: 8px; }
        .logo p { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 4px; }
        label { display: block; color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 6px; }
        .form-group { margin-bottom: 20px; }
        input[type=text], input[type=password] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #e94560; }
        button[type=submit] {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #e94560, #c62a47);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        button[type=submit]:hover { opacity: 0.9; transform: translateY(-1px); }
        .alert-error {
            background: rgba(233,69,96,0.2);
            border: 1px solid rgba(233,69,96,0.4);
            border-radius: 8px;
            color: #ff8fa3;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .alert-success {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 8px;
            color: #86efac;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .hint { color: rgba(255,255,255,0.35); font-size: 12px; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <div class="logo-icon">🐾</div>
        <h1>Zdravá Packa</h1>
        <p>Systém správy útulku</p>
    </div>

    <div class="alert-error" th:if="${param.error}">
        Neplatný email nebo heslo. Zkuste to znovu.
    </div>
    <div class="alert-success" th:if="${param.logout}">
        Byli jste úspěšně odhlášeni.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Email</label>
            <input type="text" id="username" name="username" placeholder="vas@email.cz" required/>
        </div>
        <div class="form-group">
            <label for="password">Heslo</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit">Přihlásit se</button>
    </form>
    <p class="hint">admin@example.com / admin123 &nbsp;|&nbsp; vet@example.com / heslo123</p>
</div>
</body>
</html>
