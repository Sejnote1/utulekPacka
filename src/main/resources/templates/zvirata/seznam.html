<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Zvířata – Zdravá Packa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        nav {
            background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px;
        }
        .nav-brand { font-size: 20px; font-weight: 700; color: #f8fafc; display: flex; align-items: center; gap: 10px; }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a { color: rgba(255,255,255,0.65); text-decoration: none; padding: 8px 14px; border-radius: 8px; font-size: 14px; transition: all 0.2s; }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-right { display: flex; align-items: center; gap: 16px; }
        .nav-user { color: rgba(255,255,255,0.5); font-size: 13px; }
        .btn-logout { padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 13px; text-decoration: none; transition: all 0.2s; }
        .btn-logout:hover { background: rgba(233,69,96,0.2); border-color: #e94560; color: #ff8fa3; }
        main { padding: 40px 32px; max-width: 1200px; margin: 0 auto; }
        .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        h1 { font-size: 26px; font-weight: 700; }
        .btn-primary { background: linear-gradient(135deg, #e94560, #c62a47); color: #fff; border: none; padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: opacity 0.2s; }
        .btn-primary:hover { opacity: 0.85; }
        .filters { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 20px 24px; margin-bottom: 24px; display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-group label { font-size: 12px; color: rgba(255,255,255,0.5); }
        .filter-group input, .filter-group select { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #e2e8f0; padding: 8px 12px; font-size: 14px; outline: none; }
        .filter-group select option { background: #1e293b; }
        .btn-filter { padding: 8px 16px; border-radius: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; cursor: pointer; font-size: 14px; }
        .btn-reset { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 13px; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; }
        .table-wrap { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; overflow: hidden; }
        th { background: rgba(255,255,255,0.06); padding: 14px 16px; text-align: left; font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        td { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 14px; vertical-align: middle; }
        tr:hover td { background: rgba(255,255,255,0.03); }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-green { background: rgba(34,197,94,0.15); color: #86efac; }
        .badge-blue  { background: rgba(59,130,246,0.15); color: #93c5fd; }
        .badge-orange{ background: rgba(251,146,60,0.15); color: #fdba74; }
        .badge-red   { background: rgba(239,68,68,0.15); color: #fca5a5; }
        .badge-gray  { background: rgba(148,163,184,0.15); color: #94a3b8; }
        .btn-sm { padding: 5px 12px; border-radius: 7px; font-size: 13px; text-decoration: none; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); background: transparent; cursor: pointer; transition: all 0.15s; }
        .btn-sm:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .flash-ok { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; color: #86efac; font-size: 14px; }
        .empty { text-align: center; padding: 48px; color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
<nav>
    <div class="nav-brand">🐾 Zdravá Packa</div>
    <div class="nav-links">
        <a th:href="@{/zvirata}" class="active">Zvířata</a>
        <a th:href="@{/adopce}">Adopce</a>
        <a th:href="@{/zajemci}">Zájemci</a>
        <a th:href="@{/uzivatele}" sec:authorize="hasAuthority('Administrátor')">Uživatelé</a>
        <a th:href="@{/admin}" sec:authorize="hasAuthority('Administrátor')">Dashboard</a>
    </div>
    <div class="nav-right">
        <span class="nav-user" sec:authentication="name">uživatel</span>
        <a href="/logout" class="btn-logout">Odhlásit</a>
    </div>
</nav>
<main>
    <div class="page-header">
        <h1>🐾 Evidence zvířat</h1>
        <a th:href="@{/zvirata/novy}" class="btn-primary"
           sec:authorize="hasAnyAuthority('Recepční','Administrátor')">+ Přidat zvíře</a>

    </div>
    <div class="flash-ok" th:if="${zprava}" th:text="${zprava}"></div>

    <!-- Filtry -->
    <form th:action="@{/zvirata}" method="get" class="filters">
        <div class="filter-group">
            <label>Jméno</label>
            <input type="text" name="jmeno" th:value="${filtrJmeno}" placeholder="Hledat..."/>
        </div>
        <div class="filter-group">
            <label>Status</label>
            <select name="idStatus">
                <option value="">– vše –</option>
                <option th:each="s : ${statusy}" th:value="${s.idStatus}" th:text="${s.stav}"
                        th:selected="${s.idStatus == filtrStatus}"></option>
            </select>
        </div>
        <div class="filter-group">
            <label>Plemeno</label>
            <select name="idPlemeno">
                <option value="">– vše –</option>
                <option th:each="p : ${plemena}" th:value="${p.idPlemeno}" th:text="${p.nazev}"
                        th:selected="${p.idPlemeno == filtrPlemeno}"></option>
            </select>
        </div>
        <button type="submit" class="btn-filter">Filtrovat</button>
        <a th:href="@{/zvirata}" class="btn-reset">Zrušit filtry</a>
    </form>

    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th>Jméno</th><th>Druh</th><th>Plemeno</th><th>Pohlaví</th><th>Datum přijetí</th><th>Status</th><th>Akce</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(zvirata)}">
                <td colspan="7" class="empty">Žádná zvířata nenalezena</td>
            </tr>
            <tr th:each="z : ${zvirata}">
                <td><strong th:text="${z.jmeno}">-</strong></td>
                <td th:text="${z.plemeno?.druh?.nazev}">-</td>
                <td th:text="${z.plemeno?.nazev}">-</td>
                <td th:text="${z.pohlavi == 'M' ? 'Samec' : (z.pohlavi == 'F' ? 'Samice' : '-')}">-</td>
                <td th:text="${z.datumPrijeti}">-</td>
                <td>
                    <span class="badge"
                          th:classappend="${z.status?.stav == 'K adopci' ? 'badge-green' :
                                          (z.status?.stav == 'Adoptováno' ? 'badge-blue' :
                                          (z.status?.stav == 'V léčení' ? 'badge-orange' :
                                          (z.status?.stav == 'Rezervováno' ? 'badge-orange' : 'badge-gray')))}"
                          th:text="${z.status?.stav}">-</span>
                </td>
                <td>
                    <a th:href="@{/zvirata/{id}(id=${z.idZvire})}" class="btn-sm">Detail</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
