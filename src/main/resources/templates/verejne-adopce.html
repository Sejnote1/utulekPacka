<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><title>Veřejný registr k adopci</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        nav { background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .nav-brand { font-size: 20px; font-weight: 700; color: #f8fafc; }
        .nav-links a { color: rgba(255,255,255,0.65); text-decoration: none; padding: 8px 14px; border-radius: 8px; font-size: 14px; }
        .nav-links a:hover { background: rgba(255,255,255,0.1); color: #fff; }
        main { padding: 40px 32px; max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 26px; font-weight: 700; margin-bottom: 8px; }
        p.subtitle { color: rgba(255,255,255,0.4); margin-bottom: 28px; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 24px; text-align: center; }
        .card h2 { font-size: 20px; color: #fff; margin-bottom: 10px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; background: rgba(34,197,94,0.15); color: #86efac; margin-bottom: 16px; }
        .info { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
    </style>
</head>
<body>
<nav>
    <div class="nav-brand">🐾 Zdravá Packa</div>
    <div class="nav-links">
        <a th:href="@{/login}">Přihlášení pro zaměstnance</a>
    </div>
</nav>
<main>
    <h1>Veřejný registr zvířat k adopci</h1>
    <p class="subtitle">Tato stránka je generována čistě pomocí nativního PostgreSQL View `v_zvirata_k_adopci`.</p>
    
    <div class="grid">
        <div class="card" th:each="z : ${zvirata}">
            <div class="badge">K adopci</div>
            <h2 th:text="${z.jmeno}">Jméno</h2>
            <div class="info" th:text="${z.druhNazev + ' – ' + z.plemenoNazev}">Pes – Labradorský retrívr</div>
            <div class="info" style="font-size: 12px; color: rgba(255,255,255,0.3);" th:text="'V útulku od: ' + ${z.datumPrijeti}">Od: 2024-01-01</div>
        </div>
        <div th:if="${#lists.isEmpty(zvirata)}" style="grid-column: 1 / -1; text-align: center; padding: 40px; color: rgba(255,255,255,0.3);">
            Momentálně nemáme žádná zvířata vhodná k adopci.
        </div>
    </div>
</main>
</body>
</html>
