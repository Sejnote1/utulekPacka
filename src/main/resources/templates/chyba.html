<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="'Chyba ' + ${kod} + ' – Zdravá Packa'">Chyba – Zdravá Packa</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; }
        nav { background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .nav-brand { font-size: 20px; font-weight: 700; color: #f8fafc; }
        .nav-links a { color: rgba(255,255,255,0.65); text-decoration: none; padding: 8px 14px; border-radius: 8px; font-size: 14px; }
        .nav-links a:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-logout { padding: 7px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.7); font-size: 13px; text-decoration: none; }

        /* Error page layout */
        .error-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #e94560, #c62a47);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -4px;
        }
        .error-icon {
            font-size: 56px;
            margin-bottom: 20px;
            display: block;
        }
        .error-title {
            font-size: 28px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 16px;
        }
        .error-desc {
            font-size: 15px;
            color: rgba(255,255,255,0.5);
            max-width: 480px;
            line-height: 1.7;
            margin-bottom: 36px;
        }
        .action-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c62a47);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.85; }
        .btn-secondary {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.75);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); color: #fff; }
        .divider {
            width: 48px;
            height: 3px;
            background: linear-gradient(90deg, #e94560, #c62a47);
            border-radius: 2px;
            margin: 0 auto 28px;
        }
    </style>
</head>
<body>
<nav>
    <div class="nav-brand">🐾 Zdravá Packa</div>
    <div class="nav-links">
        <a th:href="@{/zvirata}">Zvířata</a>
        <a th:href="@{/adopce}">Adopce</a>
        <a th:href="@{/zajemci}">Zájemci</a>
    </div>
    <a href="/logout" class="btn-logout">Odhlásit</a>
</nav>

<div class="error-container">
    <span class="error-icon" th:text="${kod == '403' ? '🔒' : '🔍'}">🔒</span>
    <div class="error-code" th:text="${kod}">403</div>
    <div class="divider"></div>
    <h1 class="error-title" th:text="${nadpis}">Přístup odepřen</h1>
    <p class="error-desc" th:text="${popis}">Na tuto stránku nemáš dostatečná oprávnění.</p>
    <div class="action-bar">
        <a th:href="@{/zvirata}" class="btn-primary">↩ Zpět na seznam zvířat</a>
        <a href="javascript:history.back()" class="btn-secondary">← Předchozí stránka</a>
    </div>
</div>
</body>
</html>
